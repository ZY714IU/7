name: Publish MMDB

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Download latest MMDB from private repos
        run: |
          h="Authorization: token ${{ secrets.PAT }}"
          curl -L -H "$h" -o new-asn.mmdb https://raw.githubusercontent.com/ZY714IU/geoip/release/Country-asn.mmdb
          curl -L -H "$h" -o new-cn.mmdb https://raw.githubusercontent.com/ZY714IU/GeoIP/release/Country-cn.mmdb

      - name: Detect changes
        id: diffcheck
        run: |
          # If manual run, force update
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run → force update"
            echo "changed=1" >> $GITHUB_OUTPUT
            exit 0
          fi

          changed=0
          [ -f Country-asn