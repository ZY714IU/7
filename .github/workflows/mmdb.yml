name: Publish MMDB

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Download latest MMDB
        run: |
          h="Authorization: token ${{ secrets.PAT }}"
          curl -L -H "$h" -o new-asn.mmdb https://raw.githubusercontent.com/ZY714IU/geoip/release/Country-asn.mmdb
          curl -L -H "$h" -o new-cn.mmdb https://raw.githubusercontent.com/ZY714IU/GeoIP/release/Country-cn.mmdb

      - name: Detect file changes (real diff)
        id: diffcheck
        run: |
          diff_main=0
          [ -f Country-asn.mmdb ] && cmp -s new-asn.mmdb Country-asn.mmdb || diff_main=1
          [ -f Country-cn.mmdb ]  && cmp -s new-cn.mmdb  Country-cn.mmdb  || diff_main=1
          echo "diff_main=$diff_main" >> $GITHUB_OUTPUT

      - name: Update main branch
        if: steps.diffcheck.outputs.diff_main == '1'
        run: |
          mv new-asn.mmdb Country-asn.mmdb
          mv new-cn.mmdb Country-cn.mmdb
          git config --global user.name github-actions
          git config --global user.email github-actions@users.noreply.github.com
          git add Country-asn.mmdb Country-cn.mmdb
          git commit -m "Update MMDB $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main

      - name: Generate timestamp
        id: ts
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Publish Release
        if: ${{ github.event_name == 'workflow_dispatch' || steps.diffcheck.outputs.diff_main == '1' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ts.outputs.tag }}
          name: "MMDB ${{ steps.ts.outputs.tag }}"
          files: |
            Country-asn.mmdb
            Country-cn.mmdb
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}