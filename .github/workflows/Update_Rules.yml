name: Update China.txt & Global.txt

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * *"
  push:
    paths:
    # - "Rules/Direct.txt"
      - "Rules/Proxy.txt"
      - ".github/workflows/Update_Rules.yml"

concurrency:
  group: update-rules
  cancel-in-progress: false

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all source files in parallel
        run: |
          set -euo pipefail
          pids=()
          # curl -fsSL --max-time 60 -o Direct.list "https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Direct.txt" & pids+=($!)
          # curl -fsSL --max-time 60 -o China_Domain.list "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Domain.list" & pids+=($!)
          # curl -fsSL --max-time 60 -o China_Resolve.list "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Resolve.list" & pids+=($!)
          curl -fsSL --max-time 60 -o Proxy.list "https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Proxy.txt" & pids+=($!)
          curl -fsSL --max-time 60 -o Global_Domain.list "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Domain.list" & pids+=($!)
          curl -fsSL --max-time 60 -o Global_Resolve.list "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Resolve.list" & pids+=($!)

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done
          [ "$failed" -eq 0 ] || { echo "Error: $failed download(s) failed"; exit 1; }

