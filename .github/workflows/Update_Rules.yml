name: Update China.txt & Global.txt

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * *"
  push:
    paths:
    # - "Rules/Direct.txt"
      - "Rules/Proxy.txt"
      - ".github/workflows/Update_Rules.yml"

concurrency:
  group: update-rules
  cancel-in-progress: false

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all source files in parallel
        run: |
          set -euo pipefail
          pids=()
          # curl -fsSL --max-time 60 -o Direct.list \
          #   "https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Direct.txt" & pids+=($!)
          # curl -fsSL --max-time 60 -o China_Domain.list \
          #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Domain.list" & pids+=($!)
          # curl -fsSL --max-time 60 -o China_Resolve.list \
          #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Resolve.list" & pids+=($!)
          curl -fsSL --max-time 60 -o Proxy.list \
            "https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Proxy.txt" & pids+=($!)
          curl -fsSL --max-time 60 -o Global_Domain.list \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Domain.list" & pids+=($!)
          curl -fsSL --max-time 60 -o Global_Resolve.list \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Resolve.list" & pids+=($!)

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done
          [ "$failed" -eq 0 ] || { echo "Error: $failed download(s) failed"; exit 1; }

      # - name: Generate China.txt
      #   run: |
      #     set -euo pipefail
      #     mkdir -p Rules
      #     tmp=$(mktemp)
      #     target_rules=$(mktemp)
      #     trap 'rm -f "$tmp" "${tmp}.n" "$target_rules"' EXIT
      #
      #     [ -s Direct.list ]       && cat Direct.list >> "$tmp"
      #     [ -s China_Domain.list ] && printf "\n\n" >> "$tmp" && cat China_Domain.list >> "$tmp"
      #     [ -s China_Resolve.list ] && printf "\n\n" >> "$tmp" && cat China_Resolve.list >> "$tmp"
      #     printf "\nGEOIP,CN\n" >> "$tmp"
      #
      #     sed -i 's/\r$//' "$tmp"
      #     awk 'BEGIN{b=0} /^$/{b++; if(b==1) print; next} {b=0; print}' "$tmp" > "${tmp}.n" && mv "${tmp}.n" "$tmp"
      #
      #     target="Rules/China.txt"
      #     [ -f "$target" ] && grep -v '^#' "$target" > "$target_rules" || true
      #
      #     if cmp -s "$tmp" "$target_rules"; then
      #       echo "China.txt 无变化"
      #     else
      #       echo "China.txt 已更新"
      #       {
      #         echo "# Name: China.txt"
      #         echo "# Updated: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')"
      #         echo ""
      #         cat "$tmp"
      #       } > "$target"
      #     fi

      - name: Generate Global.txt
        run: |
          set -euo pipefail
          mkdir -p Rules
          tmp=$(mktemp)
          target_rules=$(mktemp)
          trap 'rm -f "$tmp" "${tmp}.n" "$target_rules"' EXIT

          [ -s Proxy.list ]         && cat Proxy.list >> "$tmp"
          [ -s Global_Domain.list ] && printf "\n\n" >> "$tmp" && cat Global_Domain.list >> "$tmp"
          [ -s Global_Resolve.list ] && printf "\n\n" >> "$tmp" && cat Global_Resolve.list >> "$tmp"

          sed -i 's/\r$//' "$tmp"
          awk 'BEGIN{b=0} /^$/{b++; if(b==1) print; next} {b=0; print}' "$tmp" > "${tmp}.n" && mv "${tmp}.n" "$tmp"

          target="Rules/Global.txt"
          [ -f "$target" ] && grep -v '^#' "$target" > "$target_rules" || true

          if cmp -s "$tmp" "$target_rules"; then
            echo "Global.txt 无变化"
          else
            echo "Global.txt 已更新"
            {
              echo "# Name: Global.txt"
              echo "# Updated: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')"
              echo ""
              cat "$tmp"
            } > "$target"
          fi

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f Proxy.list Global_Domain.list Global_Resolve.list
          # rm -f Direct.list China_Domain.list China_Resolve.list

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rules/Global.txt
          # git add Rules/China.txt
          git diff --staged --quiet && exit 0
          git commit -m "Update Global.txt [skip ci]"
          # git commit -m "Update China.txt & Global.txt [skip ci]"
          git pull origin main --rebase
          git push origin HEAD:main
