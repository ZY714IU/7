name: Update China.txt & Global.txt

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"
  push:
    paths:
      - "Rules/Direct.txt"
      - "Rules/Proxy.txt"

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download source files
        run: |
          curl -fsSL -o Direct.list  https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Direct.txt
          curl -fsSL -o Proxy.list   https://raw.githubusercontent.com/ZY714IU/7/main/Rules/Proxy.txt
          curl -fsSL -o China_Domain.list  https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Domain.list
          curl -fsSL -o China_Resolve.list https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China_Resolve.list
          curl -fsSL -o Global_Domain.list  https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Domain.list
          curl -fsSL -o Global_Resolve.list https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global_Resolve.list

      - name: Build rules
        run: |
          mkdir -p Rules

          build () {
            tmp=$(mktemp)

            for f in "$@"; do
              [ -s "$f" ] && cat "$f" >> "$tmp" && printf "\n\n" >> "$tmp"
            done

            sed -i 's/\r$//' "$tmp"
            awk 'BEGIN{b=0} /^$/ {b++; if(b==1) print; next} {b=0; print}' "$tmp"
            rm -f "$tmp"
          }

          {
            build Direct.list China_Domain.list China_Resolve.list
            echo "GEOIP,CN"
          } > Rules/China.body

          build Proxy.list Global_Domain.list Global_Resolve.list > Rules/Global.body

      - name: Update files if changed
        run: |
          update () {
            name="$1"
            body="$2"
            target="Rules/$name.txt"

            if [ -f "$target" ]; then
              tail -n +4 "$target" > old
            else
              : > old
            fi

            if cmp -s "$body" old; then
              echo "$name.txt 无变化"
            else
              {
                echo "# Name: $name.txt"
                echo "# Updated: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')"
                echo
                cat "$body"
              } > "$target"
            fi

            rm -f old
          }

          update China  Rules/China.body
          update Global Rules/Global.body
          rm -f Rules/*.body *.list

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rules/China.txt Rules/Global.txt
          git diff --staged --quiet || git commit -m "Update China.txt & Global.txt [skip ci]"
          git push